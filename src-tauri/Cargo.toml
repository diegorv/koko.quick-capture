[package]
name = "quick-capture"
version = "0.1.0"
description = "Frictionless macOS capture inbox"
authors = ["Diego R. v."]
edition = "2021"

[lib]
name = "quick_capture_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-global-shortcut = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.32", features = ["bundled"] }
ulid = "1"

[dev-dependencies]
tempfile = "3"

