name: Security

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch:
  # Reusable: invoked by `.github/workflows/run-all.yml`.
  workflow_call:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          rust: "false"

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Job-level permissions REPLACE workflow-level (they're not merged),
    # so the `contents: read` baseline has to be redeclared alongside
    # the `checks: write` escalation required by `rustsec/audit-check`.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Audit dependencies
        # Pinned by commit SHA, not tag — same supply-chain reasoning
        # as the other third-party actions. Dependabot bumps via the
        # trailing `# v2.0.0` tag comment.
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

  # NOTE: brain repo ships a `supply-chain-quarantine` job that asserts
  # `pnpm-workspace.yaml` exists and pins `minimumReleaseAge` to >= 7
  # days. quick-capture is a single-package repo with no
  # pnpm-workspace.yaml today, so that job is intentionally dropped.
  # Add it back (mirroring brain) if/when the repo adopts workspaces.

  # NOTE: previously this file ran `actions/dependency-review-action` on
  # pull_request events. That action requires GitHub's Dependency Graph
  # API, which on private repos is gated behind GitHub Advanced Security
  # (paid). The repo is private and GHAS is not enabled, so the job
  # failed on every PR. Removed — `npm-audit` and `cargo-audit` above
  # already scan the dependency graph for known vulnerabilities. Add
  # `dependency-review` back if the repo goes public or GHAS is enabled.
