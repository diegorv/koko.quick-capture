name: Cache Warmer

# Periodic cache-warmer for the macOS Rust build cache. Builds the
# `src-tauri` workspace in release mode for the aarch64-apple-darwin
# target so GHA Cache + sccache entries stay alive across slow weeks.
#
# Why this exists:
# - GitHub's Actions Cache evicts entries that have not been accessed
#   for 7 days. A restore counts as access and resets the clock, so
#   any workflow that uses the cache keeps it alive.
# - nightly.yml runs on every push to `main`, which is the primary
#   warmer in normal use. If the project goes >1 week without a
#   commit (vacation, mid-feature pause, deep-research interlude),
#   the next push/release pays the full ~15 min cold-cache penalty.
# - Running this twice a week guarantees the cache is touched at
#   least every 4 days, well inside the 7-day eviction window.
#
# Why two days per week and not weekly:
# - Weekly (`0 4 * * 1`) is exactly 7 days between runs — right at
#   the eviction edge. A single delayed Monday run (GH outage,
#   runner queue, a previous warmer cancelled by a manual dispatch)
#   misses the window and the cache evicts.
# - `0 4 * * 1,4` (Monday + Thursday) caps the gap at 4 days,
#   leaving 3 days of slack.
#
# Cost: ~15-20 min macOS-latest runner per execution. Free for OSS,
# but the cancelled-build / queue emails would be noisy if we ran
# this daily. Bi-weekly is the cheapest cadence that stays safely
# inside the eviction window.

permissions:
  contents: read

on:
  schedule:
    - cron: '0 4 * * 1,4'  # 04:00 UTC Mon + Thu
  workflow_dispatch:

concurrency:
  # Serialized — a second warmer landing while one is still running
  # would just duplicate work. Cancel-in-progress would also work but
  # the runs are infrequent enough that queueing is clearer.
  group: cache-warmer
  cancel-in-progress: false

jobs:
  warm:
    name: Warm macOS Rust cache
    # Only the canonical repo. Forks would otherwise spend their
    # macOS minutes warming a cache that nothing else in the fork
    # consumes.
    if: github.repository == 'diegorv/koko.quick-capture'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the setup action and any future warmer
          # logic that inspects git metadata behaves identically to
          # nightly.yml + release.yml.
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          # Share the rust-cache slot with nightly.yml and release.yml.
          # The whole point of the warmer is to prime that shared
          # cache; without this key it would live in its own
          # `v0-rust-warm-...` namespace and the warmer would only
          # warm itself.
          rust-cache-key: macos-release-aarch64

      - name: Build src-tauri in release mode (no bundle, no codesign)
        # Mirrors the rustc invocations tauri-action issues during a
        # nightly/release build, so the cache entries this run
        # populates are exactly the ones the real build flow needs.
        # No `tauri build` here — we don't want to spend runner time
        # on bundling, codesign, or notarization.
        run: |
          set -euo pipefail
          cargo build \
            --release \
            --target aarch64-apple-darwin \
            --manifest-path src-tauri/Cargo.toml
          echo "Cache warm-up complete."

      - name: Report sccache stats
        # Surfaces hit rate in the workflow log so a maintainer
        # checking on cache health can see at a glance whether the
        # GHA backend is actually persisting entries between runs.
        # First-ever run will show 0% (cold); subsequent warmer or
        # nightly runs should report meaningful hit rates.
        run: |
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats
          else
            echo "sccache not on PATH — setup action may have changed shape."
          fi
